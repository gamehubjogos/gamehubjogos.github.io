<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png"> <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Hub</title>
    <style>
        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Alterado de height para min-height para evitar bugs em telas pequenas */
            margin: 0;
            padding: 20px; /* Adicionado um padding para o conteúdo não colar nas bordas da tela */
            box-sizing: border-box;
        }
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px; /* Limita a largura máxima do container */
            justify-content: center;
        }
        a {
            background-color: #00bfff;
            color: black;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s;
            text-align: center; /* Garante que o texto fique centralizado no botão */
            flex: 1; /* Faz os botões dividirem o espaço igualmente no PC */
        }
        a:hover {
            transform: scale(1.1);
        }

        /* CONFIGURAÇÃO PARA CELULAR (Telas até 600px de largura) */
        @media (max-width: 600px) {
            .container {
                flex-direction: column; /* Alinha os botões na vertical */
                width: 100%; /* O container ocupa a largura disponível */
            }
            a {
                flex: none; /* Desativa a divisão igual do PC */
                width: auto; /* O botão se adapta ao container */
            }
            a:hover {
                transform: scale(1.05); /* Um toque leve de escala para não quebrar o layout no mobile */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="1.5.2.html">Minecraft 1.5.2</a>
        <a href="1.8.8.html">Minecraft 1.8.8</a>
        <a href="1.12.2.html">Minecraft 1.12.2</a>
    </div>

</body>
</html>
