<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Hub</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-pure: #000000;
            --bg-card: #0a0a0a;
            --bg-hover: #141414;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
            --border: #1f1f1f;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-pure);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .versions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .version-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .version-card:hover {
            transform: scale(1.05);
            border-color: var(--text-dim);
            background: var(--bg-hover);
        }

        .version-number {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .version-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: var(--text-main);
            color: var(--bg-pure);
            border-color: var(--text-main);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .versions-grid {
                grid-template-columns: 1fr;
            }

            .version-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Minecraft Hub</h1>
        <p class="subtitle">Selecione uma versão para jogar</p>

        <div class="versions-grid">
            <a href="1.5.2.html" class="version-card">
                <div class="version-number">1.5.2</div>
                <div class="version-label">Versão Clássica</div>
            </a>
            <a href="1.8.8.html" class="version-card">
                <div class="version-number">1.8.8</div>
                <div class="version-label">Versão Popular</div>
            </a>
            <a href="1.12.2.html" class="version-card">
                <div class="version-number">1.12.2</div>
                <div class="version-label">Versão Recente</div>
            </a>
        </div>

        <a href="../index.html" class="back-link">← Voltar ao GameHub</a>
    </div>
</body>
</html>
